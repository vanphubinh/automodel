[package]
name = "automodel"
version = "0.11.0"
edition = "2021"
description = "AutoModel — SQL-first Reverse ORM for Rust, Built for the greater DX and for the AI Era"
license = "MIT"
repository = "https://github.com/thepartly/automodel"
keywords = ["sql", "postgresql", "codegen", "database", "yaml"]
categories = ["database", "development-tools"]
readme = "../README.md"

[dependencies]
tokio = { workspace = true }
