anyhow = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
serde_json = { workspace = true }
rust_decimal = { workspace = true }
sha2 = "0.10"
futures = "0.3"
regex = { workspace = true }
indexmap = { workspace = true }

