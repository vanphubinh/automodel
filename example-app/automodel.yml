queries_dir: queries
output_dir: src/generated

telemetry:
  level: debug
  include_sql: true

ensure_indexes: true

derives:
  return_type: [Clone]
  parameters_type: [Clone]
  conditions_type: [Clone]
  error_type: [Clone]

multiunzip_crate: itertools

# Schema-level type mappings (preferred over repeating in every SQL file).
# - schema.domain     → override generated domain alias in types/
# - schema.type.field → composite field mapping
types:
  public.positive_int: "std::num::NonZeroI32"
